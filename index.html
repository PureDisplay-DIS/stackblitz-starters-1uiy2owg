<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureDisplay - Parts Importer</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 0.5rem; }
        p { color: #5f6368; font-size: 0.9rem; margin-bottom: 2rem; }
        .upload-area { border: 2px dashed #dadce0; padding: 2rem; border-radius: 8px; margin-bottom: 1.5rem; transition: border 0.3s; }
        .upload-area:hover { border-color: #1a73e8; }
        input[type="file"] { margin-bottom: 1rem; }
        button { background-color: #1a73e8; color: white; border: none; padding: 0.8rem 2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; width: 100%; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #log { margin-top: 1.5rem; text-align: left; background: #202124; color: #00ff00; padding: 1rem; border-radius: 6px; font-family: 'Courier New', Courier, monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; }
        .error { color: #ea4335; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>PureDisplay - Parts</h2>
    <p>Stammdaten-Import in die Cloud-Datenbank</p>
    
    <div class="upload-area">
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <button id="importBtn" onclick="startImport()">Import starten</button>
    
    <div id="log">Bereit... Warte auf Datei.</div>
</div>

<script>
    // DEINE KONFIGURATION (puredisplay-66e76)
    const firebaseConfig = {
        apiKey: "AIzaSyDWXj3UpPlqvIZx80VqE7JPGSTqJgRY-0E",
        authDomain: "puredisplay-66e76.firebaseapp.com",
        projectId: "puredisplay-66e76",
        storageBucket: "puredisplay-66e76.firebasestorage.app",
        messagingSenderId: "204186912930",
        appId: "1:204186912930:web:1b35bd0c69036771aceffb"
    };

    // Firebase Initialisierung
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function startImport() {
        const fileInput = document.getElementById('csvFile');
        const log = document.getElementById('log');
        const btn = document.getElementById('importBtn');
        
        if (!fileInput.files[0]) {
            alert("Bitte wähle zuerst die CSV-Datei aus!");
            return;
        }

        btn.disabled = true;
        log.innerHTML = "Lese Datei...<br>";

        Papa.parse(fileInput.files[0], {
            header: true,
            skipEmptyLines: true,
            complete: async function(results) {
                const data = results.data;
                let successCount = 0;

                log.innerHTML = `Starte Upload von ${data.length} Zeilen...<br>`;

                for (let i = 0; i < data.length; i++) {
                    const item = data[i];
                    const partId = item["Material code"]; // Dokument-ID ist die Teilenummer
                    
                    if (!partId) continue;

                    try {
                        // Speichern in Collection 'parts'
                        await db.collection("parts").doc(partId).set({
                            name: item["SAP material name"] || "Unbekannt",
                            min_packing: parseInt(item["Minimum packing quantity"]) || 1,
                            vehicles: item["Applicable vehicle series"] || "N/A",
                            new_part_code: item["New part code"] || "",
                            last_sync: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true }); // 'merge: true' bewahrt deine manuellen Lagerorte!

                        successCount++;
                        
                        // Fortschritt alle 5 Einträge anzeigen
                        if (successCount % 5 === 0 || successCount === data.length) {
                            log.innerHTML = `Fortschritt: ${successCount} / ${data.length}<br>Letztes Teil: ${partId}`;
                            log.scrollTop = log.scrollHeight;
                        }
                    } catch (err) {
                        console.error(err);
                        log.innerHTML += `<br><span class="error">Fehler bei ${partId}: ${err.message}</span>`;
                    }
                }
                log.innerHTML += `<br><br>✅ IMPORT ABGESCHLOSSEN!<br>${successCount} Teile sind jetzt live.`;
                btn.disabled = false;
            }
        });
    }
</script>

</body>
</html>
